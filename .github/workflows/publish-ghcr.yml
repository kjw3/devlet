name: publish-ghcr

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-agent-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - id: prep
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/devlet-agent-base
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/agents/Dockerfile.base
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.prep.outputs.build_date }}
            VERSION=${{ github.ref_name }}
            REPOSITORY_URL=${{ github.server_url }}/${{ github.repository }}

  build-derived-agents:
    runs-on: ubuntu-latest
    needs: build-agent-base
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: openclaw
            dockerfile: packages/agents/Dockerfile.openclaw
            image: devlet-agent-openclaw
          - name: nanoclaw
            dockerfile: packages/agents/Dockerfile.nanoclaw
            image: devlet-agent-nanoclaw
          - name: hermes
            dockerfile: packages/agents/Dockerfile.hermes
            image: devlet-agent-hermes
          - name: moltis
            dockerfile: packages/agents/Dockerfile.moltis
            image: devlet-agent-moltis
    steps:
      - uses: actions/checkout@v4
      - id: prep
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          build-args: |
            BASE_AGENT_IMAGE=${{ env.IMAGE_PREFIX }}/devlet-agent-base:sha-${{ github.sha }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.prep.outputs.build_date }}
            VERSION=${{ github.ref_name }}
            REPOSITORY_URL=${{ github.server_url }}/${{ github.repository }}

  build-app-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            dockerfile: packages/server/Dockerfile
            image: devlet-server
          - name: web
            dockerfile: packages/web/Dockerfile
            image: devlet-web
    steps:
      - uses: actions/checkout@v4
      - id: prep
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.prep.outputs.build_date }}
            VERSION=${{ github.ref_name }}
            REPOSITORY_URL=${{ github.server_url }}/${{ github.repository }}
