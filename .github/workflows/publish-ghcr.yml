name: publish-ghcr

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/publish-ghcr.yml"
      - "docker-compose.yml"
      - "docker-compose.dev.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "packages/agents/**"
      - "packages/server/**"
      - "packages/shared/**"
      - "packages/web/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      agent_base: ${{ steps.filter.outputs.agent_base }}
      openclaw: ${{ steps.filter.outputs.openclaw }}
      nanoclaw: ${{ steps.filter.outputs.nanoclaw }}
      hermes: ${{ steps.filter.outputs.hermes }}
      moltis: ${{ steps.filter.outputs.moltis }}
      server: ${{ steps.filter.outputs.server }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            agent_base:
              - '.github/workflows/publish-ghcr.yml'
              - 'docker-compose.yml'
              - 'docker-compose.dev.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/agents/Dockerfile.base'
              - 'packages/agents/entrypoint.base.sh'
              - 'packages/agents/devlet-*.sh'
              - 'packages/agents/devlet-*.py'
              - 'packages/server/src/platforms/env.ts'
              - 'packages/shared/**'
            openclaw:
              - '.github/workflows/publish-ghcr.yml'
              - 'docker-compose.yml'
              - 'docker-compose.dev.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/agents/Dockerfile.base'
              - 'packages/agents/entrypoint.base.sh'
              - 'packages/agents/devlet-*.sh'
              - 'packages/agents/devlet-*.py'
              - 'packages/agents/Dockerfile.openclaw'
              - 'packages/agents/entrypoint.openclaw.sh'
              - 'packages/server/src/platforms/env.ts'
              - 'packages/shared/**'
            nanoclaw:
              - '.github/workflows/publish-ghcr.yml'
              - 'docker-compose.yml'
              - 'docker-compose.dev.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/agents/Dockerfile.base'
              - 'packages/agents/entrypoint.base.sh'
              - 'packages/agents/devlet-*.sh'
              - 'packages/agents/devlet-*.py'
              - 'packages/agents/Dockerfile.nanoclaw'
              - 'packages/agents/entrypoint.nanoclaw.sh'
              - 'packages/server/src/platforms/env.ts'
              - 'packages/shared/**'
            hermes:
              - '.github/workflows/publish-ghcr.yml'
              - 'docker-compose.yml'
              - 'docker-compose.dev.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/agents/Dockerfile.base'
              - 'packages/agents/entrypoint.base.sh'
              - 'packages/agents/devlet-*.sh'
              - 'packages/agents/devlet-*.py'
              - 'packages/agents/Dockerfile.hermes'
              - 'packages/agents/entrypoint.hermes.sh'
              - 'packages/server/src/platforms/env.ts'
              - 'packages/shared/**'
            moltis:
              - '.github/workflows/publish-ghcr.yml'
              - 'docker-compose.yml'
              - 'docker-compose.dev.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/agents/Dockerfile.base'
              - 'packages/agents/entrypoint.base.sh'
              - 'packages/agents/devlet-*.sh'
              - 'packages/agents/devlet-*.py'
              - 'packages/agents/Dockerfile.moltis'
              - 'packages/agents/entrypoint.moltis.sh'
              - 'packages/server/src/platforms/env.ts'
              - 'packages/shared/**'
            server:
              - '.github/workflows/publish-ghcr.yml'
              - 'docker-compose.yml'
              - 'docker-compose.dev.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/server/**'
              - 'packages/shared/**'
            web:
              - '.github/workflows/publish-ghcr.yml'
              - 'docker-compose.yml'
              - 'docker-compose.dev.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/web/**'
              - 'packages/shared/**'

  build-agent-base:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || needs.detect-changes.outputs.agent_base == 'true' || needs.detect-changes.outputs.openclaw == 'true' || needs.detect-changes.outputs.nanoclaw == 'true' || needs.detect-changes.outputs.hermes == 'true' || needs.detect-changes.outputs.moltis == 'true'
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v5
      - id: prep
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/devlet-agent-base
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/agents/Dockerfile.base
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.prep.outputs.build_date }}
            VERSION=${{ github.ref_name }}
            REPOSITORY_URL=${{ github.server_url }}/${{ github.repository }}

  build-derived-agents:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || needs.detect-changes.outputs.openclaw == 'true' || needs.detect-changes.outputs.nanoclaw == 'true' || needs.detect-changes.outputs.hermes == 'true' || needs.detect-changes.outputs.moltis == 'true' || needs.detect-changes.outputs.agent_base == 'true'
    runs-on: ubuntu-latest
    needs: [detect-changes, build-agent-base]
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: openclaw
            dockerfile: packages/agents/Dockerfile.openclaw
            image: devlet-agent-openclaw
            filter: openclaw
          - name: nanoclaw
            dockerfile: packages/agents/Dockerfile.nanoclaw
            image: devlet-agent-nanoclaw
            filter: nanoclaw
          - name: hermes
            dockerfile: packages/agents/Dockerfile.hermes
            image: devlet-agent-hermes
            filter: hermes
          - name: moltis
            dockerfile: packages/agents/Dockerfile.moltis
            image: devlet-agent-moltis
            filter: moltis
    steps:
      - uses: actions/checkout@v5
      - id: prep
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v7
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || needs.detect-changes.outputs.agent_base == 'true' || needs.detect-changes.outputs[matrix.filter] == 'true'
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          build-args: |
            BASE_AGENT_IMAGE=${{ env.IMAGE_PREFIX }}/devlet-agent-base:sha-${{ github.sha }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.prep.outputs.build_date }}
            VERSION=${{ github.ref_name }}
            REPOSITORY_URL=${{ github.server_url }}/${{ github.repository }}

  build-app-images:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || needs.detect-changes.outputs.server == 'true' || needs.detect-changes.outputs.web == 'true'
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            dockerfile: packages/server/Dockerfile
            image: devlet-server
            filter: server
          - name: web
            dockerfile: packages/web/Dockerfile
            image: devlet-web
            filter: web
    steps:
      - uses: actions/checkout@v5
      - id: prep
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v7
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || needs.detect-changes.outputs[matrix.filter] == 'true'
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.prep.outputs.build_date }}
            VERSION=${{ github.ref_name }}
            REPOSITORY_URL=${{ github.server_url }}/${{ github.repository }}
