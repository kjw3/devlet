version: "3.9"

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: devlet-portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    labels:
      - "devlet.managed=true"

  # Placeholder: add Proxmox mock or VE here if needed
  # proxmox-mock:
  #   image: ...

volumes:
  portainer_data:
