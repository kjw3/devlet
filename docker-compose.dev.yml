# Development override for local source builds.
#
# Use with the deployment compose file:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# The base compose file uses published ghcr.io images. This override swaps the
# app services back to local Docker builds for development and debugging.

services:
  devlet-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      - NODE_ENV=production
    image: devlet/devlet-server:dev

  devlet-web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    image: devlet/devlet-web:dev
