services:
  devlet-server:
    image: ${SERVER_IMAGE:-ghcr.io/kjw3/devlet-server:latest}
    container_name: devlet-server
    restart: unless-stopped
    environment:
      DEVLET_AUTH_TOKEN: ${DEVLET_AUTH_TOKEN}
      DEVLET_PUBLIC_BASE_URL: ${DEVLET_PUBLIC_BASE_URL}
      DEVLET_AGENT_SSH_AUTHORIZED_KEYS: ${DEVLET_AGENT_SSH_AUTHORIZED_KEYS:-}
      DEVLET_DOCKER_PROXY_HOST: ${DEVLET_DOCKER_PROXY_HOST:-}
      PORTAINER_URL: ${PORTAINER_URL:-}
      PORTAINER_API_KEY: ${PORTAINER_API_KEY:-}
      PORTAINER_EXCLUDED_ENDPOINTS: ${PORTAINER_EXCLUDED_ENDPOINTS:-}
      PROXMOX_URL: ${PROXMOX_URL:-}
      PROXMOX_USER: ${PROXMOX_USER:-}
      PROXMOX_TOKEN_ID: ${PROXMOX_TOKEN_ID:-}
      PROXMOX_TOKEN_SECRET: ${PROXMOX_TOKEN_SECRET:-}
      PROXMOX_INSECURE: ${PROXMOX_INSECURE:-false}
      PROXMOX_EXCLUDED_NODES: ${PROXMOX_EXCLUDED_NODES:-}
      PROXMOX_NODE: ${PROXMOX_NODE:-}
      PROXMOX_STORAGE: ${PROXMOX_STORAGE:-}
      PROXMOX_LXC_TEMPLATE: ${PROXMOX_LXC_TEMPLATE:-}
      PROXMOX_QEMU_TEMPLATE_ID: ${PROXMOX_QEMU_TEMPLATE_ID:-0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      AGENT_IMAGE_CLAUDE_CODE: ${AGENT_IMAGE_CLAUDE_CODE:-}
      AGENT_IMAGE_CODEX: ${AGENT_IMAGE_CODEX:-}
      AGENT_IMAGE_OPENCODE: ${AGENT_IMAGE_OPENCODE:-}
      AGENT_IMAGE_PI: ${AGENT_IMAGE_PI:-}
      AGENT_IMAGE_GEMINI: ${AGENT_IMAGE_GEMINI:-}
      AGENT_IMAGE_OPENCLAW: ${AGENT_IMAGE_OPENCLAW:-}
      AGENT_IMAGE_NANOCLAW: ${AGENT_IMAGE_NANOCLAW:-}
      AGENT_IMAGE_HERMES: ${AGENT_IMAGE_HERMES:-}
      AGENT_IMAGE_MOLTIS: ${AGENT_IMAGE_MOLTIS:-}
      AGENT_IMAGE_NEMOCLAW: ${AGENT_IMAGE_NEMOCLAW:-}
    ports:
      - "${SERVER_PORT:-3001}:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - devlet_state:/root/.devlet
    labels:
      - "devlet.managed=true"

  devlet-web:
    image: ${WEB_IMAGE:-ghcr.io/kjw3/devlet-web:latest}
    container_name: devlet-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - devlet-server
    labels:
      - "devlet.managed=true"

volumes:
  devlet_state:
