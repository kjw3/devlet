services:
  devlet-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: devlet-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SERVER_PORT:-3001}:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - devlet_state:/root/.devlet
    env_file:
      - .env
    labels:
      - "devlet.managed=true"

  devlet-web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: devlet-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:80"
    depends_on:
      - devlet-server
    labels:
      - "devlet.managed=true"

volumes:
  devlet_state:
