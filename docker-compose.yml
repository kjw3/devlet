services:
  devlet-server:
    image: ${SERVER_IMAGE:-ghcr.io/kjw3/devlet-server:sha-6e97e6c}
    container_name: devlet-server
    restart: unless-stopped
    environment:
      DEVLET_AUTH_TOKEN: ${DEVLET_AUTH_TOKEN}
      DEVLET_PUBLIC_BASE_URL: ${DEVLET_PUBLIC_BASE_URL}
      DEVLET_AGENT_SSH_AUTHORIZED_KEYS: ${DEVLET_AGENT_SSH_AUTHORIZED_KEYS:-}
      PORTAINER_URL: ${PORTAINER_URL:-}
      PORTAINER_API_KEY: ${PORTAINER_API_KEY:-}
      PORTAINER_EXCLUDED_ENDPOINTS: ${PORTAINER_EXCLUDED_ENDPOINTS:-}
      PROXMOX_URL: ${PROXMOX_URL:-}
      PROXMOX_USER: ${PROXMOX_USER:-}
      PROXMOX_TOKEN_ID: ${PROXMOX_TOKEN_ID:-}
      PROXMOX_TOKEN_SECRET: ${PROXMOX_TOKEN_SECRET:-}
      PROXMOX_INSECURE: ${PROXMOX_INSECURE:-false}
      PROXMOX_EXCLUDED_NODES: ${PROXMOX_EXCLUDED_NODES:-}
      PROXMOX_NODE: ${PROXMOX_NODE:-}
      PROXMOX_STORAGE: ${PROXMOX_STORAGE:-}
      PROXMOX_LXC_TEMPLATE: ${PROXMOX_LXC_TEMPLATE:-}
      PROXMOX_QEMU_TEMPLATE_ID: ${PROXMOX_QEMU_TEMPLATE_ID:-0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
    ports:
      - "${SERVER_PORT:-3001}:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - devlet_state:/root/.devlet
    labels:
      - "devlet.managed=true"

  devlet-web:
    image: ${WEB_IMAGE:-ghcr.io/kjw3/devlet-web:sha-6e97e6c}
    container_name: devlet-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - devlet-server
    labels:
      - "devlet.managed=true"

volumes:
  devlet_state:
